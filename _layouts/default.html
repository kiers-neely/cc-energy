<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} — Project MOVE</title>
  <style>
    /* ── Reset & base ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --sidebar-w: 220px;
      --navy: #1F3864;
      --accent: #534AB7;
      --text-primary: #212529;
      --text-secondary: #6c757d;
      --text-tertiary: #868e96;
      --bg-page: #f4f6fb;
      --bg-secondary: #f8f9fa;
      --bg-warning: #fff3cd;
      --bg-info: #d1ecf1;
      --bg-success: #d4edda;
      --text-info: #0c5460;
      --text-success: #155724;
      --border: #dee2e6;
      --border-light: #e9ecef;
      --border-info: #bee5eb;
      --border-success: #c3e6cb;
      --radius: 6px;
      --radius-lg: 10px;
    }
    body {
      font-family: var(--font-sans);
      background: var(--bg-page);
      color: var(--text-primary);
      display: flex;
      min-height: 100vh;
    }

    /* ── Sidebar ──────────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      background: var(--navy);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0;
      z-index: 100;
    }
    .sidebar-brand {
      padding: 20px 18px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .sidebar-brand-title {
      font-size: 13px;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .sidebar-brand-sub {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      margin-top: 3px;
      line-height: 1.4;
    }
    .sidebar-nav { padding: 12px 0; flex: 1; }
    .nav-section-label {
      font-size: 10px;
      font-weight: 600;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      letter-spacing: .08em;
      padding: 12px 18px 6px;
    }
    .nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 18px;
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      border-left: 3px solid transparent;
      transition: background .15s, color .15s, border-color .15s;
    }
    .nav-link:hover { background: rgba(255,255,255,0.07); color: #ffffff; }
    .nav-link.active {
      background: rgba(255,255,255,0.1);
      color: #ffffff;
      border-left-color: #7B73CC;
    }
    .nav-icon { width: 16px; height: 16px; opacity: .75; flex-shrink: 0; }
    .nav-link.active .nav-icon { opacity: 1; }
    .sidebar-footer {
      padding: 14px 18px;
      border-top: 1px solid rgba(255,255,255,0.1);
      font-size: 10px;
      color: rgba(255,255,255,0.3);
      line-height: 1.5;
    }

    /* ── Main content ─────────────────────────────────────── */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      padding: 32px 36px;
      max-width: 960px;
    }
    .page-title {
      font-size: 22px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }
    .page-sub {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 1.75rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border-light);
    }

    /* ── Shared component styles ──────────────────────────── */
    .sr-only { position:absolute;left:-10000px;top:auto;width:1px;height:1px;overflow:hidden }
    .kpi-grid { display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1.5rem }
    .kpi { background:var(--bg-secondary);border-radius:var(--radius);padding:12px 14px }
    .kpi-label { font-size:11px;color:var(--text-secondary);margin:0 0 4px;text-transform:uppercase;letter-spacing:.04em }
    .kpi-val { font-size:20px;font-weight:500;color:var(--text-primary);margin:0 }
    .kpi-sub { font-size:11px;color:var(--text-tertiary);margin:2px 0 0 }
    .kpi-peak { background:var(--bg-warning) }
    .kpi-hi { background:var(--bg-success) }
    .kpi-hi .kpi-val { color:var(--text-success) }
    .sec { font-size:11px;font-weight:500;color:var(--text-secondary);margin:1.4rem 0 8px;text-transform:uppercase;letter-spacing:.05em;border-bottom:.5px solid var(--border-light);padding-bottom:4px }
    .tab-bar { display:flex;gap:4px;margin-bottom:.75rem;flex-wrap:wrap }
    .tab { font-size:12px;padding:4px 12px;border-radius:var(--radius);border:1px solid #ccc;background:#f5f5f5;color:var(--text-secondary);cursor:pointer }
    .tab:hover { background:#e0e0e0 }
    .tab.on-blue { background:var(--bg-info);color:var(--text-info);border-color:var(--border-info) }
    .tab.on-green { background:var(--bg-success);color:var(--text-success);border-color:var(--border-success) }
    .leg { display:flex;flex-wrap:wrap;gap:14px;margin-bottom:6px;font-size:12px;color:var(--text-secondary) }
    .leg span { display:flex;align-items:center;gap:5px }
    .sw { width:10px;height:10px;border-radius:2px;display:inline-block }
    .sw-dash { width:18px;height:0;display:inline-block;border-top:2px dashed }
    .slider-row { display:flex;align-items:center;gap:10px;margin-bottom:.5rem }
    .slider-row label { font-size:12px;color:var(--text-secondary);min-width:180px }
    .slider-row input[type=range] { flex:1;accent-color:var(--accent) }
    .slider-row span { font-size:12px;font-weight:500;color:var(--text-primary);min-width:52px;text-align:right }
    .assm-grid { display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:.5rem }
    .assm { background:var(--bg-secondary);border-radius:var(--radius);padding:10px 12px;border-left:3px solid var(--accent) }
    .assm-label { font-size:10px;color:var(--text-secondary);margin:0 0 2px;text-transform:uppercase;letter-spacing:.04em }
    .assm-val { font-size:15px;font-weight:500;color:var(--text-primary);margin:0 }
    .assm-sub { font-size:10px;color:var(--text-tertiary);margin:1px 0 0 }
    .note { font-size:11px;color:var(--text-tertiary);margin-top:1rem;padding-top:.75rem;border-top:.5px solid var(--border-light);line-height:1.7 }

    /* ── Mobile header & overlay ──────────────────────────── */
    .mobile-header {
      display: none;
      align-items: center;
      gap: 12px;
      background: var(--navy);
      padding: 12px 16px;
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      height: 52px;
    }
    .hamburger {
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px;
      color: #fff;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }
    .mobile-title {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 150;
    }
    .sidebar-overlay.open { display: block; }

    /* ── Responsive breakpoints ───────────────────────────── */
    @media (max-width: 767px) {
      .mobile-header { display: flex; }

      .sidebar {
        transform: translateX(-100%);
        transition: transform .25s ease;
        z-index: 200;
      }
      .sidebar.open { transform: translateX(0); }

      .main {
        margin-left: 0;
        padding: 16px 16px 24px;
        padding-top: calc(52px + 16px);
        max-width: 100%;
      }

      .kpi-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .assm-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }

      .slider-row { flex-wrap: wrap; }
      .slider-row label { min-width: unset; width: 100%; }
      .slider-row input[type=range] { width: 100%; }
      .slider-row span { min-width: unset; }
    }

    @media (max-width: 479px) {
      .kpi-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .assm-grid { grid-template-columns: 1fr; }
      .main { padding: 12px 12px 20px; padding-top: calc(52px + 12px); }
    }
  </style>
</head>
<body>

  <div class="mobile-header" id="mobileHeader">
    <button class="hamburger" id="hamburgerBtn" aria-label="Open navigation" aria-expanded="false">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <line x1="3" y1="6"  x2="19" y2="6"/>
        <line x1="3" y1="11" x2="19" y2="11"/>
        <line x1="3" y1="16" x2="19" y2="16"/>
      </svg>
    </button>
    <span class="mobile-title">Project MOVE</span>
  </div>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  {% include sidebar.html %}

  <main class="main">
    <h1 class="page-title">{{ page.title }}</h1>
    <p class="page-sub">{{ page.subtitle }}</p>
    {{ content }}
  </main>

  <script>
    (function () {
      var btn = document.getElementById('hamburgerBtn');
      var overlay = document.getElementById('sidebarOverlay');
      var sidebar = document.querySelector('.sidebar');

      function open() {
        sidebar.classList.add('open');
        overlay.classList.add('open');
        btn.setAttribute('aria-expanded', 'true');
      }
      function close() {
        sidebar.classList.remove('open');
        overlay.classList.remove('open');
        btn.setAttribute('aria-expanded', 'false');
      }

      btn.addEventListener('click', function () {
        sidebar.classList.contains('open') ? close() : open();
      });
      overlay.addEventListener('click', close);

      document.querySelectorAll('.nav-link').forEach(function (link) {
        link.addEventListener('click', function () {
          if (window.innerWidth < 768) close();
        });
      });
    })();
  </script>

</body>
</html>
